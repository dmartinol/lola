repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.9.18
    hooks:
      - id: uv-export
        args: ["--frozen", "--no-dev", "--output-file=requirements.txt", "--quiet"]
      - id: uv-export
        args: ["--frozen", "--group", "dev", "--output-file=requirements-dev.txt", "--quiet"]

  - repo: local
    hooks:
      - id: ty-check
        name: ty-check
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run mypy src
        language: system
        types: [python]
        pass_filenames: false

      - id: bandit
        name: bandit
        entry: uv run bandit -r src
        language: system
        types: [python]
        pass_filenames: false

      - id: generate-sbom
        name: generate-sbom
        entry: bash -c '
          new=$(uv export --frozen --no-dev --format cyclonedx1.5 --preview-features sbom-export --quiet);
          new_stable=$(echo "$new" | jq "del(.serialNumber, .metadata.timestamp)");
          old_stable=$(jq "del(.serialNumber, .metadata.timestamp)" sbom.json 2>/dev/null || echo "");
          if [ "$new_stable" != "$old_stable" ]; then echo "$new" > sbom.json && git add sbom.json; fi'
        language: system
        files: ^(uv\.lock|pyproject\.toml)$
        pass_filenames: false

      - id: snyk
        name: snyk
        entry: >-
          bash -c 'snyk sbom test --file=sbom.json 2>&1 ||
          { echo "WARNING: Snyk SBOM test failed (Early Access feature is unstable)" >&2; exit 0; }'
        language: system
        pass_filenames: false
        verbose: true

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        types: [python]
        pass_filenames: false