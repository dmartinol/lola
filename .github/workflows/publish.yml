name: Publish to PyPI

on:
  workflow_dispatch:
  push:
    branches: [main]
  release:
    types: [published]

permissions: {}

jobs:
  build:
    if: github.repository == 'LobsterTrap/lola'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Compute version for workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        id: version
        run: |
          # Get base version from git describe (e.g., 0.4.3.post15.dev17)
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          TAG="${TAG#v}"
          DISTANCE=$(git rev-list "${TAG:+v}${TAG}..HEAD" --count 2>/dev/null || echo "0")
          VERSION="${TAG}.post${GITHUB_RUN_NUMBER}.dev${DISTANCE}"
          echo "SETUPTOOLS_SCM_PRETEND_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Building version: ${VERSION}"

      - name: Build package
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
